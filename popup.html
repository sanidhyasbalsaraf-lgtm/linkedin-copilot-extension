<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>LinkedIn Copilot</title>
  <link rel="stylesheet" href="tokens.css" />
  <link rel="stylesheet" href="popup.css" />
  <script src="theme.js"></script>
</head>
<body>
  <header class="masthead">
    <div class="wordmark">
      LinkedIn Copilot <span class="version" id="version"></span>
    </div>
    <button class="ghost-icon" id="openOptions" title="Settings" aria-label="Settings">⚙</button>
  </header>

  <div id="errorBanner" class="flag flag-danger" hidden role="alert"></div>

  <section class="rail-section">
    <div class="rail-heading">
      <span class="eyebrow">Source material</span>
    </div>
    <div class="field">
      <div class="field-label-row">
        <label for="jd">Job description</label>
        <button class="link-btn" id="reExtractJd" type="button">Re-scan</button>
      </div>
      <textarea id="jd" rows="3" placeholder="Not found on this page — open a LinkedIn job posting, or paste it here manually."></textarea>
    </div>
    <div class="field">
      <div class="field-label-row">
        <label for="hm">Hiring manager / recruiter</label>
        <button class="link-btn" id="reExtractHm" type="button">Re-scan</button>
      </div>
      <textarea id="hm" rows="2" placeholder="Not found — open their profile or the job's 'Meet the hiring team' card, or paste details here."></textarea>
    </div>
  </section>

  <section class="rail-section">
    <div class="rail-heading">
      <span class="eyebrow">Draft</span>
    </div>
    <div class="field">
      <label for="draftType">Message type</label>
      <select id="draftType">
        <option value="connection_note">Connection request note (≤300 chars)</option>
        <option value="inmail">InMail / direct message to hiring manager</option>
        <option value="reply">Reply to the job posting (cover-note style)</option>
      </select>
    </div>

    <button class="btn-primary" id="generate" type="button">Generate draft</button>
    <p id="genStatus" class="hint"></p>

    <div class="field" id="subjectField" hidden>
      <label for="subject">Subject</label>
      <input type="text" id="subject" placeholder="Generated with the draft — InMail only" />
    </div>
    <div class="field">
      <label for="draft">Result</label>
      <textarea id="draft" rows="4"></textarea>
      <div class="button-row">
        <button id="copyDraft" class="btn-ghost" type="button">Copy</button>
        <button id="insertDraft" class="btn-secondary" type="button">Insert into LinkedIn</button>
      </div>
      <p id="insertStatus" class="hint"></p>
    </div>
  </section>

  <script src="popup.js"></script>
</body>
</html>
